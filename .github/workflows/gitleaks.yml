name: Gitleaks

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "43 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
